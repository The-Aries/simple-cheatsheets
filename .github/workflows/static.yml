# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  DEPLOY_SOURCE_BRANCH: main

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SOURCE_BRANCH }}
      - name: Generate release info
        run: |
          node <<'NODE'
          const fs = require('fs');
          const shortSha = (process.env.GITHUB_SHA || '').slice(0, 7);
          const branch = process.env.DEPLOY_SOURCE_BRANCH || 'main';
          const content = [
            '(function () {',
            '  var release = {',
            `    version: "${shortSha}",`,
            `    branch: "${branch}"`,
            '  };',
            '',
            '  window.CHEATSHEET_RELEASE = release;',
            '',
            '  window.CHEATSHEET_LOG_RELEASE = function () {',
            '    if (window.__CHEATSHEET_RELEASE_LOGGED__) {',
            '      return;',
            '    }',
            '    window.__CHEATSHEET_RELEASE_LOGGED__ = true;',
            '    if (window.console && typeof window.console.info === "function") {',
            '      window.console.info("[simple-cheatsheets] version=" + release.version + " branch=" + release.branch);',
            '    }',
            '  };',
            '})();',
            ''
          ].join('\n');
          fs.writeFileSync('scripts/release-info.js', content);
          NODE
        env:
          DEPLOY_SOURCE_BRANCH: ${{ env.DEPLOY_SOURCE_BRANCH }}
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
