<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git Cheatsheet - Simple Cheatsheets</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../styles.css?v=20260418e">
</head>
<body class="cheatsheet-page" data-root="../" data-module="git" data-page-src="../data/pages/git.js?v=20260418h">
  <header class="topbar">
    <a class="brand" href="../">simple-cheatsheets</a>
    <nav id="page-top-nav" aria-label="Global navigation"></nav>
  </header>
  <aside id="page-sidebar" class="sidebar" aria-label="Page navigation"></aside>
  <main id="page-content" class="content"></main>
  <footer id="page-footer" class="footer"></footer>
  <script src="../scripts/modules.js?v=20260418h"></script>
  <script src="../scripts/runtime-validation.js?v=20260419a"></script>
  <script src="../data/common.js?v=20260418h"></script>
  <script src="../data/pages/git.js?v=20260418h" onerror="window.CHEATSHEET_PAGE_LOAD_ERROR='failed to load ../data/pages/git.js?v=20260418h'"></script>
  <script src="../scripts/sidebar-shell.js?v=20260418h"></script>
  <script src="../scripts/template-page.js?v=20260418h"></script>
  <script src="../scripts/cheatsheet-renderer.js?v=20260418h"></script>
  <script>
    (function () {
      if (!document.body || document.body.dataset.module !== "git") { return; }
      var lead = document.querySelector("#page-header .lead");
      if (!lead) { return; }
      if (lead.querySelector('a[href="https://git-scm.com/doc"]')) { return; }
      var phrase = "official Git documentation";
      var text = lead.textContent || "";
      var index = text.indexOf(phrase);
      if (index === -1) { return; }
      var before = text.slice(0, index);
      var after = text.slice(index + phrase.length);
      lead.textContent = "";
      lead.appendChild(document.createTextNode(before));
      var link = document.createElement("a");
      link.href = "https://git-scm.com/doc";
      link.textContent = phrase;
      lead.appendChild(link);
      lead.appendChild(document.createTextNode(after));
    })();
  </script>
</body>
</html>
